name: Housekeeping

on:
  repository_dispatch:
  workflow_dispatch:
  schedule:
    - cron: '00 18 * * *'

permissions:
  issues: write
  contents: read

jobs:
  find_closed_references:
    name: 🔒 Closed references
    runs-on: ubuntu-latest
    if: github.repository_owner == 'dmnktoe'
    steps:
      - name: ⬇️ Checkout repo
        uses: actions/checkout@v3

      - name: ⎔ Setup node
        uses: actions/setup-node@v3
        with:
          node-version: 16

      - name: ✅ Find closed references
        uses: ory/closed-reference-notifier@v1
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          issueLimit: ${{ github.event.inputs.issueLimit || '5' }}
          ignore: .git,/docs/releases/*,CHANGELOG.md

  find_broken_links:
    name: 🔗 Broken links
    runs-on: ubuntu-latest
    if: github.repository_owner == 'dmnktoe'
    steps:
      - name: ⬇️ Checkout repo
        uses: actions/checkout@v3

      - uses: actions/cache@v3
        with:
          path: .lycheecache
          key: housekeeping-find-broken-links-${{ github.sha }}
          restore-keys: housekeeping-find-broken-links-

      - name: 🔎 Find broken links
        id: lychee
        uses: lycheeverse/lychee-action@v1.8.0
        with:
          args: >-
            '**/*.md'
            --require-https
            --exclude-all-private
            --exclude-mail
            --exclude 'example\.(com|org)'
            --exclude '\$server_name\$request_uri'
            --exclude 'https://www.youtube-nocookie.com'
            --exclude 'github\.com/dmnktoe/duecker-medizintechnik/(issues|pulls)'
            --cache
            --max-cache-age 2d
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: 📝 Create Issue from File
        if: env.lychee_exit_code != 0
        uses: peter-evans/create-issue-from-file@v4
        with:
          title: Link Checker Report
          content-filepath: ./lychee/out.md
          labels: report, links
